version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: debttracker
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    env_file: .env
    environment:
      # Intentionally overrides DATABASE_URL from .env — containers must use the
      # service name "db", not "localhost". Do not set DATABASE_URL in .env for Docker.
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/debttracker
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
      - backend
    env_file: .env
    environment:
      # See backend service comment — intentional override for Docker networking.
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/debttracker
    command: python /app/bot/bot.py
    volumes:
      - ./backend:/app
      - ./bot:/app/bot

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"

volumes:
  pgdata:
